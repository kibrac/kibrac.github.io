    <script>
    if ('performance' in window && 'PerformanceObserver' in window) {
        
        const observer = new PerformanceObserver((list) => {
            for (const entry of list.getEntries()) {
                
                if (entry.entryType === 'largest-contentful-paint') {
                    console.log(`LCP: ${entry.startTime}`);
                } else if (entry.entryType === 'first-input') {
                    console.log(`FID: ${entry.processingStart - entry.startTime}`);
                } else if (entry.entryType === 'layout-shift') {
                    console.log(`CLS: ${entry.value}`);
                }
            }
        });
        
        
        observer.observe({entryTypes: ['largest-contentful-paint', 'first-input', 'layout-shift']});
    }
    </script>
    
    
    <script>
        
        if ('loading' in HTMLImageElement.prototype) {
            
            console.log('Browser supports native lazy loading');
        } else {
            
            const script = document.createElement('script');
            script.src = '\/js\/lazysizes.min.js';
            script.async = true;
            document.body.appendChild(script);
            
            
            document.addEventListener('DOMContentLoaded', function() {
                const images = document.querySelectorAll('img[loading="lazy"]');
                images.forEach(img => {
                    img.classList.add('lazyload');
                    img.setAttribute('data-src', img.src);
                    
                    if (img.width && img.height) {
                        
                        const ratio = (img.height / img.width * 100).toFixed(2);
                        const placeholder = `data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${img.width} ${img.height}" width="${img.width}" height="${img.height}"%3E%3Crect width="100%" height="100%" fill="%23f0f0f0"%3E%3C/rect%3E%3C/svg%3E`;
                        img.src = placeholder;
                        
                        if (img.parentNode) {
                            img.parentNode.style.position = 'relative';
                            img.parentNode.style.paddingBottom = `${ratio}%`;
                            img.parentNode.style.height = '0';
                            img.parentNode.style.overflow = 'hidden';
                            img.style.position = 'absolute';
                            img.style.top = '0';
                            img.style.left = '0';
                            img.style.width = '100%';
                            img.style.height = '100%';
                        }
                    } else {
                        img.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1 1"%3E%3C/svg%3E';
                    }
                });
            });
        }
        
        
        document.addEventListener('DOMContentLoaded', function() {
            const images = document.querySelectorAll('img[loading="lazy"]');
            images.forEach(img => {
                img.addEventListener('load', function() {
                    
                    img.style.transition = 'opacity 0.3s ease-in';
                    img.style.opacity = '1';
                });
                
                img.style.opacity = '0';
            });
        });
    </script>
